<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lori's Blog Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f7f8;
      --surface:   #ffffff;
      --border:    #e5e5e5;
      --user-bg:   #1a1a2e;
      --user-fg:   #ffffff;
      --bot-bg:    #ffffff;
      --bot-fg:    #1a1a1a;
      --accent:    #1a1a2e;
      --muted:     #6b7280;
      --source-bg: #f0f4ff;
      --source-fg: #3730a3;
      --radius:    12px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
    }
    #status-badge {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    #status-badge.ready { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 780px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .message.user  { margin-left: auto; flex-direction: row-reverse; }
    .message.bot   { margin-right: auto; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .message.user .avatar { background: var(--user-bg); color: var(--user-fg); }
    .message.bot  .avatar { background: #e5e7eb; color: #374151; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 15px;
    }
    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-fg);
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-fg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      min-width: 80px;
    }

    /* Markdown inside bot bubble */
    .bubble p  { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 8px 0 10px 20px; }
    .bubble li { margin-bottom: 4px; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 6px; font-size: 15px; }
    .bubble code {
      background: #f3f4f6;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: "SF Mono", Menlo, monospace;
    }
    .bubble pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }
    .bubble pre code { background: none; padding: 0; color: inherit; }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--muted);
      margin: 8px 0;
    }
    .bubble a { color: var(--source-fg); text-decoration: underline; }

    /* Sources */
    .sources {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-chip {
      font-size: 11px;
      background: var(--source-bg);
      color: var(--source-fg);
      padding: 3px 8px;
      border-radius: 20px;
      text-decoration: none;
      border: 1px solid #c7d2fe;
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-chip:hover { background: #e0e7ff; }

    /* Typing indicator */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
      margin: 0 2px;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* Empty state */
    #empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }
    #empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    #empty-state h2 { font-size: 18px; color: #374151; margin-bottom: 8px; }
    #empty-state p  { font-size: 14px; max-width: 340px; line-height: 1.5; }

    /* ── Input ── */
    #input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 15px;
      font-family: var(--font);
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      height: 44px;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }

    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      height: 44px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #clear-btn:hover { background: var(--bg); }

    @media (max-width: 600px) {
      #messages { padding: 16px 10px; }
      .message  { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <span style="font-size:20px">🗞️</span>
  <h1>Lori's Blog Chat</h1>
  <span id="status-badge">loading…</span>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="icon">✍️</div>
    <h2>Ask about the articles</h2>
    <p>I can answer questions, find articles by topic, or summarize what Lori has written about.</p>
  </div>
</div>

<div id="input-bar">
  <textarea id="input" placeholder="Ask something about the articles…" rows="1"></textarea>
  <button id="clear-btn" title="Clear conversation">Clear</button>
  <button id="send-btn">Send</button>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let history = [];   // [{role, content}]
  let busy    = false;

  // ── Init ───────────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  fetch("/status")
    .then(r => r.json())
    .then(d => {
      const badge = document.getElementById("status-badge");
      if (d.chunks > 0) {
        badge.textContent = `${d.chunks} chunks · ${d.provider}`;
        badge.classList.add("ready");
      } else {
        badge.textContent = "index empty — run build_index.py first";
      }
    })
    .catch(() => {
      document.getElementById("status-badge").textContent = "server error";
    });

  // ── Helpers ────────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const clearBtn   = document.getElementById("clear-btn");

  function removeEmptyState() {
    const es = document.getElementById("empty-state");
    if (es) es.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    removeEmptyState();
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;
    wrap.innerHTML = `
      <div class="avatar">${role === "user" ? "Y" : "L"}</div>
      <div class="bubble">${role === "bot" ? marked.parse(text) : escHtml(text)}</div>
    `;
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function addTyping() {
    removeEmptyState();
    const wrap = document.createElement("div");
    wrap.className = "message bot";
    wrap.id = "typing";
    wrap.innerHTML = `
      <div class="avatar">L</div>
      <div class="bubble">
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </div>`;
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function setBusy(val) {
    busy = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function send() {
    const msg = inputEl.value.trim();
    if (!msg || busy) return;

    inputEl.value = "";
    autoResize();
    setBusy(true);

    addMessage("user", msg);
    const typingWrap = addTyping();

    let botText    = "";
    let sources    = [];
    let bubbleEl   = null;

    try {
      const resp = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, history }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: "Server error" }));
        throw new Error(err.detail || "Server error");
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          if (data.sources) {
            sources = data.sources;
            // Replace typing indicator with real bubble
            typingWrap.remove();
            const wrap = document.createElement("div");
            wrap.className = "message bot";
            wrap.innerHTML = `<div class="avatar">L</div><div class="bubble"></div>`;
            messagesEl.appendChild(wrap);
            bubbleEl = wrap.querySelector(".bubble");
          }

          if (data.text && bubbleEl) {
            botText += data.text;
            bubbleEl.innerHTML = marked.parse(botText);
            scrollBottom();
          }

          if (data.error && bubbleEl) {
            botText += `\n\n⚠️ ${data.error}`;
            bubbleEl.innerHTML = marked.parse(botText);
          }

          if (data.done && bubbleEl && sources.length) {
            const sourcesDiv = document.createElement("div");
            sourcesDiv.className = "sources";
            const seen = new Set();
            for (const s of sources) {
              if (seen.has(s.url)) continue;
              seen.add(s.url);
              const a = document.createElement("a");
              a.href = s.url;
              a.target = "_blank";
              a.rel = "noopener";
              a.className = "source-chip";
              a.title = s.title;
              a.textContent = "📄 " + s.title;
              sourcesDiv.appendChild(a);
            }
            bubbleEl.appendChild(sourcesDiv);
            scrollBottom();
          }
        }
      }

      // Update history
      history.push({ role: "user",      content: msg });
      history.push({ role: "assistant", content: botText });
      // Keep last 10 turns to avoid token explosion
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      typingWrap.remove();
      addMessage("bot", `⚠️ Error: ${err.message}`);
    }

    setBusy(false);
    inputEl.focus();
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  sendBtn.addEventListener("click", send);

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  inputEl.addEventListener("input", autoResize);

  clearBtn.addEventListener("click", () => {
    history = [];
    messagesEl.innerHTML = `
      <div id="empty-state">
        <div class="icon">✍️</div>
        <h2>Ask about the articles</h2>
        <p>I can answer questions, find articles by topic, or summarize what Lori has written about.</p>
      </div>`;
    inputEl.focus();
  });
</script>
</body>
</html>
